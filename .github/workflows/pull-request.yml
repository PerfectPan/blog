name: Pull Request Check

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: TypeScript Check
        run: pnpm typecheck

      - name: Biome Check
        run: pnpm biome check ./apps ./packages

      - name: Build (Cloudflare Worker)
        run: pnpm --filter @blog/web build

      # Guard the free-tier budget: the deployed worker must stay under the
      # Workers free-plan limit (3 MiB gzip). Fails the PR if we blow past it.
      - name: Worker bundle-size guard (< 3 MiB gzip)
        run: pnpm --filter @blog/web exec wrangler deploy -c dist/server/wrangler.json --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
