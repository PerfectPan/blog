name: Pull Request Check

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      # pnpm/action-setup reads the version from packageManager in package.json,
      # so it stays in sync without a hardcoded version. Installing pnpm before
      # setup-node lets setup-node's `cache: pnpm` find it.
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Check
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Unit Tests
        run: pnpm test

      - name: Build (Cloudflare Worker)
        run: pnpm --filter @blog/web build

      # Guard the free-tier budget: the deployed worker must stay under the
      # Workers free-plan limit (3 MiB gzip). Fails the PR if we blow past it.
      - name: Worker bundle-size guard (< 3 MiB gzip)
        run: pnpm --filter @blog/web exec wrangler deploy -c dist/server/wrangler.json --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
